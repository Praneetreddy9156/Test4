<!DOCTYPE html>
<html>
<head>
    <title>Azure Maps - Geofence Input Demo</title>
    <meta charset="utf-8" />

    <script src="https://atlas.microsoft.com/sdk/javascript/mapcontrol/2/atlas.min.js"></script>
    <link href="https://atlas.microsoft.com/sdk/javascript/mapcontrol/2/atlas.min.css" rel="stylesheet" />

    <style>
        body { font-family: Arial; margin: 0; }
        #map { width: 100%; height: 500px; }
        #panel { padding: 10px; }
        input { padding: 5px; width: 120px; }
        button { margin: 5px; padding: 6px 10px; }
    </style>
</head>
<body>

<h3>Geofence with Dynamic Radius</h3>

<div id="panel">
    Radius (km): <input type="number" id="radiusInput" value="50" />
    <button onclick="checkGeofence()">Check Geofence</button>
    <p id="output"></p>
</div>

<div id="map"></div>

<script>
var map, dataSource;

// Pune center
var geofenceCenter = [73.8567, 18.5204];

function initMap() {
    map = new atlas.Map('map', {
        center: geofenceCenter,
        zoom: 6,
        authOptions: {
            authType: 'subscriptionKey',
            subscriptionKey: 'YOUR_KEY'
        }
    });

    map.events.add('ready', function () {
        dataSource = new atlas.source.DataSource();
        map.sources.add(dataSource);

        map.layers.add(new atlas.layer.PolygonLayer(dataSource, null, {
            fillColor: 'rgba(0, 0, 255, 0.2)'
        }));

        map.layers.add(new atlas.layer.SymbolLayer(dataSource));
    });
}

window.onload = initMap;

function checkGeofence() {

    var radiusKm = parseFloat(document.getElementById("radiusInput").value);
    if (!radiusKm || radiusKm <= 0) {
        document.getElementById('output').innerText = "Enter valid radius";
        return;
    }

    var radiusMeters = radiusKm * 1000;

    var vehicle = [73.5, 18.7]; // simulated vehicle

    // distance calc
    var dx = vehicle[0] - geofenceCenter[0];
    var dy = vehicle[1] - geofenceCenter[1];
    var dist = Math.sqrt(dx*dx + dy*dy) * 111000;

    var inside = dist < radiusMeters;

    document.getElementById('output').innerText =
        inside ? "Vehicle INSIDE geofence" : "Vehicle OUTSIDE geofence";

    dataSource.clear();

    // vehicle
    dataSource.add(new atlas.data.Feature(
        new atlas.data.Point(vehicle)
    ));

    // circle polygon
    var points = [];
    for (var i = 0; i <= 360; i += 5) {
        var angle = i * Math.PI / 180;
        var dx = (radiusMeters/111000) * Math.cos(angle);
        var dy = (radiusMeters/111000) * Math.sin(angle);

        points.push([
            geofenceCenter[0] + dx,
            geofenceCenter[1] + dy
        ]);
    }

    dataSource.add(new atlas.data.Feature(
        new atlas.data.Polygon([points])
    ));

    map.setCamera({ center: geofenceCenter, zoom: 7 });
}
</script>

</body>
</html>
